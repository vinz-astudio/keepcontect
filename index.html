<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#15130e" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KeepContact" />
    <!-- iOS PWA Startup Images to eliminate cold-start black screen -->
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-1290-2796.png" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-1179-2556.png" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-1284-2778.png" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-1170-2532.png" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-1242-2688.png" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-828-1792.png"  media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-1125-2436.png" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="/splash/apple-launch-750-1334.png"  media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <title>Keep Contact</title>
    <script>
      (function() {
        try {
          var t = localStorage.getItem('kc.theme');
          if (t === 'light') {
            document.documentElement.classList.add('light-theme');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="splash">
        <div class="splash__content">
          <div class="splash__logo">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <circle cx="12" cy="12" r="10" />
              <circle cx="12" cy="12" r="4" fill="currentColor" />
            </svg>
          </div>
          <h1 class="splash__title">Keep Contact</h1>
          <div class="splash__bar">
            <div class="splash__progress"></div>
          </div>
          <p class="splash__status" id="splash-status">Loading...</p>
        </div>
      </div>
      <script>
        try {
          var lang = localStorage.getItem('kc.lang');
          if (lang === 'zh') {
            document.getElementById('splash-status').innerText = '正在加载...';
          }
        } catch (e) {}
      </script>
      <style>
        /* Default dark theme */
        :root {
          --splash-bg: #15130e;
          --splash-fg: #f4efe5;
          --splash-accent: #e0855f;
          --splash-line: #38332a;
        }
        /* Light theme override */
        .light-theme {
          --splash-bg: #fcfbf8;
          --splash-fg: #2c2820;
          --splash-accent: #cb6f49;
          --splash-line: #e5dec9;
        }
        
        .splash {
          position: fixed;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          height: 100dvh;
          background: var(--splash-bg);
          color: var(--splash-fg);
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: 'Hanken Grotesk', system-ui, sans-serif;
          z-index: 99999;
          background-image: radial-gradient(
            120% 80% at 50% -10%,
            rgba(224, 133, 95, 0.06),
            transparent 60%
          );
        }
        .splash__content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1.5rem;
          text-align: center;
        }
        .splash__logo {
          color: var(--splash-accent);
          animation: splash-pulse 2s infinite ease-in-out;
        }
        .splash__title {
          font-family: 'Fraunces', Georgia, serif;
          font-size: 2rem;
          font-weight: 600;
          margin: 0;
          letter-spacing: -0.02em;
        }
        .splash__bar {
          width: 160px;
          height: 4px;
          background: var(--splash-line);
          border-radius: 2px;
          overflow: hidden;
          position: relative;
        }
        .splash__progress {
          position: absolute;
          top: 0;
          left: 0;
          height: 100%;
          width: 30%;
          background: var(--splash-accent);
          border-radius: 2px;
          animation: splash-loading 1.6s infinite linear;
        }
        .splash__status {
          font-size: 0.85rem;
          color: var(--splash-fg);
          opacity: 0.5;
          margin: 0;
        }
        
        @keyframes splash-pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.08); opacity: 0.85; }
        }
        @keyframes splash-loading {
          0% { left: -30%; width: 30%; }
          50% { width: 40%; }
          100% { left: 100%; width: 30%; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
